name: Build games-sbox

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "games/sbox/*"
      - .github/workflows/games-sbox.yml

jobs:
  build:
    uses: ./.github/workflows/docker-build.yml
    with:
      context: ./games
      file: ./games/sbox/Dockerfile
      tags: ghcr.io/sparkedhost/images:games-sbox
